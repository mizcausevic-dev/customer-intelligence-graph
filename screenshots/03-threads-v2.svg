<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="900" fill="#06111F"/>
  <rect x="36" y="32" width="1368" height="836" rx="30" fill="#0D1122" stroke="#26314D"/>
  <text x="86" y="104" fill="#8FDBFF" font-family="Arial, sans-serif" font-size="22" letter-spacing="6">NARRATIVE THREADS</text>
  <text x="86" y="170" fill="#F4F0DC" font-family="Georgia, serif" font-size="48" font-weight="700">
    <tspan x="86" dy="0">Three linked stories the graph is surfacing.</tspan>
  </text>

  <rect x="86" y="238" width="396" height="540" rx="26" fill="#121A31" stroke="#26314D"/>
  <rect x="522" y="238" width="396" height="540" rx="26" fill="#121A31" stroke="#26314D"/>
  <rect x="958" y="238" width="396" height="540" rx="26" fill="#121A31" stroke="#26314D"/>

  <rect x="122" y="278" width="180" height="48" rx="24" fill="#22324E"/>
  <rect x="558" y="278" width="188" height="48" rx="24" fill="#22324E"/>
  <rect x="994" y="278" width="170" height="48" rx="24" fill="#22324E"/>

  <text x="154" y="309" fill="#D8E5FF" font-family="Arial, sans-serif" font-size="19">Revenue + Product</text>
  <text x="590" y="309" fill="#D8E5FF" font-family="Arial, sans-serif" font-size="19">Success + Support</text>
  <text x="1026" y="309" fill="#D8E5FF" font-family="Arial, sans-serif" font-size="19">Growth + RevOps</text>

  <text x="122" y="390" fill="#F4F0DC" font-family="Georgia, serif" font-size="30" font-weight="700">
    <tspan x="122" dy="0">Expansion</tspan>
    <tspan x="122" dy="34">thread</tspan>
  </text>
  <text x="558" y="390" fill="#F4F0DC" font-family="Georgia, serif" font-size="30" font-weight="700">
    <tspan x="558" dy="0">Trust recovery</tspan>
    <tspan x="558" dy="34">thread</tspan>
  </text>
  <text x="994" y="390" fill="#F4F0DC" font-family="Georgia, serif" font-size="30" font-weight="700">
    <tspan x="994" dy="0">Attribution</tspan>
    <tspan x="994" dy="34">thread</tspan>
  </text>

  <text x="122" y="470" fill="#A5B2CF" font-family="Arial, sans-serif" font-size="20">
    <tspan x="122" dy="0">Usage depth and partner advocacy</tspan>
    <tspan x="122" dy="28">are clustering around two teams</tspan>
    <tspan x="122" dy="28">with real expansion authority.</tspan>
  </text>
  <text x="558" y="470" fill="#A5B2CF" font-family="Arial, sans-serif" font-size="20">
    <tspan x="558" dy="0">Support drag is eroding adoption</tspan>
    <tspan x="558" dy="28">confidence right before renewal</tspan>
    <tspan x="558" dy="28">pressure fully arrives.</tspan>
  </text>
  <text x="994" y="470" fill="#A5B2CF" font-family="Arial, sans-serif" font-size="20">
    <tspan x="994" dy="0">Partner influence is lifting</tspan>
    <tspan x="994" dy="28">downstream conversion quality</tspan>
    <tspan x="994" dy="28">beyond paid search alone.</tspan>
  </text>

  <rect x="122" y="630" width="324" height="106" rx="18" fill="#17213C"/>
  <rect x="558" y="630" width="324" height="106" rx="18" fill="#17213C"/>
  <rect x="994" y="630" width="324" height="106" rx="18" fill="#17213C"/>

  <text x="148" y="670" fill="#F2EBC7" font-family="Arial, sans-serif" font-size="22" font-weight="700">
    <tspan x="148" dy="0">Package the lane and</tspan>
    <tspan x="148" dy="28">activate the sponsor.</tspan>
  </text>
  <text x="584" y="670" fill="#F2EBC7" font-family="Arial, sans-serif" font-size="22" font-weight="700">
    <tspan x="584" dy="0">Route to recovery and</tspan>
    <tspan x="584" dy="28">pause the friction lane.</tspan>
  </text>
  <text x="1020" y="670" fill="#F2EBC7" font-family="Arial, sans-serif" font-size="22" font-weight="700">
    <tspan x="1020" dy="0">Reweight sourcing and</tspan>
    <tspan x="1020" dy="28">shift budget assisted.</tspan>
  </text>
</svg>
